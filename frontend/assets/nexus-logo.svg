<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- outer glow ring -->
  <circle cx="24" cy="24" r="22" stroke="url(#glow)" stroke-width="1.5" opacity="0.3" filter="url(#blur)"/>
  <!-- main ring -->
  <circle cx="24" cy="24" r="20" stroke="url(#glow)" stroke-width="2" fill="none"/>
  <!-- brain/nexus nodes -->
  <circle cx="24" cy="14" r="2.5" fill="#60a5fa"/>
  <circle cx="16" cy="22" r="2.5" fill="#3b82f6"/>
  <circle cx="32" cy="22" r="2.5" fill="#3b82f6"/>
  <circle cx="24" cy="30" r="2.5" fill="#60a5fa"/>
  <circle cx="18" cy="32" r="2" fill="#2563eb"/>
  <circle cx="30" cy="32" r="2" fill="#2563eb"/>
  <!-- connections -->
  <line x1="24" y1="14" x2="16" y2="22" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="14" x2="32" y2="22" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="22" x2="24" y2="30" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="22" x2="24" y2="30" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="22" x2="32" y2="22" stroke="#2563eb" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="30" x2="18" y2="32" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="30" x2="30" y2="32" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <!-- center core -->
  <circle cx="24" cy="23" r="3.5" fill="url(#glow)" opacity="0.9"/>
  <circle cx="24" cy="23" r="6" stroke="#60a5fa" stroke-width="0.8" fill="none" opacity="0.25" filter="url(#blur)"/>
</svg>
